name: Deploy Lambda Function

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (based on which Terraform is applied)'
        required: true
        type: choice
        options:
          - dev
          - demo

jobs:
  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    environment: dev
    if: github.event.inputs.environment == 'dev'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dependencies with Lambda-compatible wheels
          pip install --platform manylinux2014_x86_64 --target package --implementation cp --python-version 3.11 --only-binary=:all: --upgrade -r requirements.txt
          # Copy Lambda function
          cp src/lambda_function.py package/
      
      - name: Create deployment package
        run: |
          cd package
          zip -r ../lambda-deployment-dev-${{ github.sha }}.zip .
          cd ..
      
      - name: Configure AWS credentials for Dev
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to Lambda - Dev
        run: |
          aws lambda update-function-code \
            --function-name csye6225-email-verification-dev \
            --zip-file fileb://lambda-deployment-dev-${{ github.sha }}.zip \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name csye6225-email-verification-dev \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Update Lambda Environment Variables - Dev
        run: |
          aws lambda update-function-configuration \
            --function-name csye6225-email-verification-dev \
            --environment Variables="{
              DOMAIN=dev.malavgajera.me,
              FROM_EMAIL=noreply@malavgajera.me,
              SENDGRID_API_KEY_SECRET_NAME=csye6225-sendgrid-key-dev,
              DYNAMODB_TABLE_NAME=email-verification-tokens-dev
            }" \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for configuration update
        run: |
          aws lambda wait function-updated \
            --function-name csye6225-email-verification-dev \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Publish new version - Dev
        run: |
          aws lambda publish-version \
            --function-name csye6225-email-verification-dev \
            --description "Deployed from GitHub Actions - SHA: ${{ github.sha }}" \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-package-dev
          path: lambda-deployment-dev-${{ github.sha }}.zip
          retention-days: 7

  deploy-demo:
    name: Deploy to Demo Environment
    runs-on: ubuntu-latest
    environment: demo
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'demo'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dependencies with Lambda-compatible wheels
          pip install --platform manylinux2014_x86_64 --target package --implementation cp --python-version 3.11 --only-binary=:all: --upgrade -r requirements.txt
          # Copy Lambda function
          cp src/lambda_function.py package/
      
      - name: Create deployment package
        run: |
          cd package
          zip -r ../lambda-deployment-demo-${{ github.sha }}.zip .
          cd ..
      
      - name: Configure AWS credentials for Demo
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEMO }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEMO }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Deploy to Lambda - Demo
        run: |
          aws lambda update-function-code \
            --function-name csye6225-email-verification-demo \
            --zip-file fileb://lambda-deployment-demo-${{ github.sha }}.zip \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name csye6225-email-verification-demo \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Update Lambda Environment Variables - Demo
        run: |
          aws lambda update-function-configuration \
            --function-name csye6225-email-verification-demo \
            --environment Variables="{
              DOMAIN=demo.malavgajera.me,
              FROM_EMAIL=noreply@malavgajera.me,
              SENDGRID_API_KEY_SECRET_NAME=csye6225-sendgrid-key-demo,
              DYNAMODB_TABLE_NAME=email-verification-tokens-demo
            }" \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Wait for configuration update
        run: |
          aws lambda wait function-updated \
            --function-name csye6225-email-verification-demo \
            --region ${{ secrets.AWS_REGION }}
      
      - name: Publish new version - Demo
        run: |
          aws lambda publish-version \
            --function-name csye6225-email-verification-demo \
            --description "Deployed from GitHub Actions - SHA: ${{ github.sha }}" \
